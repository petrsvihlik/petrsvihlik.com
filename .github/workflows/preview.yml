name: Preview

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Install dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Generate site
        run: dotnet run --configuration Release
      - name: Index with Pagefind
        run: npx pagefind --site output
      - name: Install Surge
        run: npm install -g surge
      - name: Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: surge ./output petrsvihlik-pr-${{ github.event.pull_request.number }}.surge.sh
      - name: Save PR number
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt
      - uses: actions/upload-artifact@v7
        with:
          name: pr-number
          path: pr-number.txt
          retention-days: 1

  teardown-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Install Surge
        run: npm install -g surge
      - name: Teardown Surge preview
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: surge teardown petrsvihlik-pr-${{ github.event.pull_request.number }}.surge.sh
